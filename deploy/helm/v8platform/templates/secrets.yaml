apiVersion: v1
kind: Secret
metadata:
  name: {{ include "v8platform.fullname" . }}-secrets
  labels:
    {{- include "v8platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if not .Values.database.existingSecret }}
  DATABASE_URL: {{ include "v8platform.dbUrl" . | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.slackWebhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.discordWebhookUrl }}
  DISCORD_WEBHOOK_URL: {{ .Values.secrets.discordWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpHost }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  {{- end }}
