apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "v8platform.fullname" . }}-config
  labels:
    {{- include "v8platform.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.apiServer.env.NODE_ENV | quote }}
  PORT: {{ .Values.apiServer.env.PORT | quote }}
  LOG_LEVEL: {{ .Values.apiServer.env.LOG_LEVEL | quote }}
  AI_ENABLE_ATTACK_CHAINS: {{ .Values.apiServer.env.AI_ENABLE_ATTACK_CHAINS | quote }}
  REPORTS_DIR: /data/reports
  {{- if .Values.monitoring.enabled }}
  ENABLE_METRICS: "true"
  {{- end }}
