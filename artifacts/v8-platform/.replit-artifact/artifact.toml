kind = "web"
previewPath = "/"
title = "V8 Neural Exploitation Platform"
version = "1.0.0"
id = "artifacts/v8-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25277

[services.development]
run = "pnpm --filter @workspace/v8-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/v8-platform", "run", "build" ]
publicDir = "artifacts/v8-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25277"
BASE_PATH = "/"
