# =============================================================================
# V8 Neural Exploitation Platform — Docker Compose
# =============================================================================
#
# Full-stack deployment for development and production.
#
# Services:
#   db          — PostgreSQL 17 with persistent volume
#   api-server  — Express + TypeScript API server
#   frontend    — Nginx + React frontend (Vite-built)
#   adminer     — Database admin UI (development only)
#
# Usage:
#   docker compose up -d                     # Start all services
#   docker compose up -d api-server db       # Start specific services
#   docker compose logs -f api-server        # Tail logs
#   docker compose down -v                   # Stop and remove volumes
#
# Environment file (.env) example:
#   JWT_SECRET=your-strong-secret-here
#   DATABASE_URL=postgres://v8:v8password@db:5432/v8platform
#   AI_PROVIDER=openai
#   OPENAI_API_KEY=sk-...

version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: v8-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: v8
      POSTGRES_PASSWORD: ${DB_PASSWORD:-v8password}
      POSTGRES_DB: v8platform
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U v8 -d v8platform"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - v8-network

  # ── API Server ─────────────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: v8-api-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-v8-platform-dev-secret-change-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://v8:v8password@db:5432/v8platform}
      AI_PROVIDER: ${AI_PROVIDER:-heuristic}
      AI_ENABLE_ATTACK_CHAINS: ${AI_ENABLE_ATTACK_CHAINS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REPORTS_DIR: /data/reports
    volumes:
      - reports-data:/data/reports
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - v8-network

  # ── Frontend (Nginx + React) ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.v8-platform
    container_name: v8-frontend
    restart: unless-stopped
    depends_on:
      - api-server
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - v8-network

  # ── Adminer (Development Only) ─────────────────────────────────────────────
  adminer:
    image: adminer:4.8-standalone
    container_name: v8-adminer
    restart: unless-stopped
    profiles:
      - dev
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - v8-network

networks:
  v8-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  reports-data:
    driver: local
