# =============================================================================
# V8 Neural Exploitation Platform — CI/CD Pipeline
# =============================================================================
#
# Runs on every push and pull request to main/develop:
#   1. Install dependencies
#   2. Build shared libraries
#   3. Typecheck all packages
#   4. Run unit tests
#   5. Build packages
#   6. Lint check (optional)
#   7. Build Docker images (on main only)

name: V8 Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9"

jobs:
  # ── Quality Gate ──────────────────────────────────────────────────────────
  quality:
    name: "Quality Gate (Typecheck + Test + Lint)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build shared libs first so dependent packages can typecheck
      - name: Build shared libraries
        run: |
          pnpm --filter @workspace/db build
          pnpm --filter @workspace/api-zod build
          pnpm --filter @workspace/api-client-react build

      - name: TypeScript typecheck — API Server
        run: pnpm --filter @workspace/api-server exec tsc --noEmit --pretty

      - name: TypeScript typecheck — Frontend
        run: pnpm --filter @workspace/v8-platform exec tsc --noEmit --pretty

      # Run vitest from root workspace (vitest is a root devDependency)
      - name: Unit tests — API Server
        run: pnpm exec vitest run --reporter=verbose

      - name: Lint check (optional)
        continue-on-error: true
        run: |
          if [ -f "artifacts/api-server/.eslintrc*" ] || [ -f "artifacts/api-server/eslint.config.*" ]; then
            pnpm --filter @workspace/api-server exec eslint src/
          fi
          echo "Lint skipped — no ESLint config found"

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: "Build Packages"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @workspace/db build
          pnpm --filter @workspace/api-zod build
          pnpm --filter @workspace/api-client-react build
          pnpm --filter @workspace/api-server build
          pnpm --filter @workspace/v8-platform build

      - name: Upload API server build
        uses: actions/upload-artifact@v4
        with:
          name: api-server-dist
          path: artifacts/api-server/dist/
          retention-days: 3

      - name: Upload Frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/v8-platform/dist/
          retention-days: 3

  # ── Docker Build (main only) ──────────────────────────────────────────────
  docker:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api-server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api-server:latest
            ghcr.io/${{ github.repository }}/api-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.v8-platform
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan (main only) ─────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
